<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Responsive Interactive Site</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header>
    <h1>Responsive Interactive Site</h1>
    <nav>
      <a href="#quiz">Quiz</a>
      <a href="#weather">Weather</a>
    </nav>
  </header>

  <!-- Responsive Section -->
  <section class="intro">
    <h2>Welcome!</h2>
    <p>This page demonstrates advanced CSS and JavaScript skills.</p>
  </section>

  <!-- Interactive Quiz -->
  <section id="quiz">
    <h2>Quick Quiz</h2>
    <div id="quiz-container"></div>
    <button id="next-btn">Next</button>
  </section>

  <!-- Fetch API Example -->
  <section id="weather">
    <h2>Weather Checker</h2>
    <input type="text" id="city" placeholder="Enter city" />
    <button id="getWeather">Get Weather</button>
    <div id="weatherResult"></div>
  </section>

  <footer>
    <p>Built with ❤️ using HTML, CSS, and JS</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
